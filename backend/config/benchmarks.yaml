# Controls which (engine, dimension, query) combinations run during benchmarks.
# Comment out any entry to skip it without touching Python code.

# Classical engines — no shots/layers parameters.
#   brute_force_cosine  — deterministic cosine similarity (no index, brute-force). Fast baseline.
#   faiss_flat_l2       — real FAISS IndexFlatL2 index. Production-grade classical search.
classical_engines:
  - brute_force_cosine
  # - faiss_flat_l2

# Quantum engines — accept shots/layers parameters and populate circuit_depth/num_qubits fields.
#   quantum_mock_sampler — cosine similarity + configurable noise to simulate quantum measurement
#                          error. Uses shots/layers below. No real quantum hardware.
#   qiskit_swap_test    — real Qiskit circuit running a swap test on AerSimulator.
#                         Measures vector similarity via quantum overlap. Slow on large dataset.
quantum_engines:
  - quantum_mock_sampler
  # - qiskit_swap_test

# Embedding dimensions to benchmark. Each engine is run once per dimension.
# Higher dimensions = richer embeddings but slower search.
dimensions:
  - 64
  # - 128

# Number of quantum circuit measurement shots per query.
# More shots = more accurate results but higher cost on real hardware.
# Only used by quantum_mock_sampler and qiskit_swap_test.
shots_values:
  - 512
  # - 1024
  # - 2048
  # - 4096

# Number of variational layers in the quantum circuit.
# More layers = deeper circuit (higher circuit_depth) and potentially better accuracy,
# but increases decoherence risk on real hardware.
# Only used by quantum_mock_sampler.
layers_values:
  - 1
  # - 2
  # - 3
