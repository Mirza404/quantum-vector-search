# Controls which (engine, dimension, query) combinations run during benchmarks.
# Comment out any entry to skip it without touching Python code.
# See docs/FAQ.md for a full explanation of every parameter and the trade-offs.

# Classical engines - no shots/layers parameters.
#   brute_force_cosine  - deterministic cosine similarity (no index, brute-force). Fast baseline.
#   faiss_flat_l2       - real FAISS IndexFlatL2 index. Exact classical search.
#   faiss_hnsw_l2       - HNSW (Hierarchical Navigable Small World) approximate search. Production algorithm (Meta, Spotify, Google).
classical_engines:
  - brute_force_cosine
  - faiss_flat_l2
  - faiss_hnsw_l2

# Quantum engines - accept shots/layers parameters and populate circuit_depth/num_qubits fields.
#   qiskit_swap_test    - real Qiskit circuit running a swap test on AerSimulator.
#                         Measures vector similarity via quantum overlap. Slow on large dataset.
#   qiskit_grover       - Grover's algorithm on AerSimulator. Demonstrates O(√N) oracle scaling.
#                         Hardcoded state prep for toy dataset. See docs/QUANTUM_SEARCH_ANALYSIS.md.
quantum_engines:
  - qiskit_swap_test
  - qiskit_grover

# Vector dimensions to benchmark. Vectors are truncated to the first d components of the CLIP
# output (already L2-normalised). Lower d = fewer qubits + shallower circuit + lower accuracy.
# Upper bound: 512 for ViT-B/32, 768 for ViT-L/14. Add any value up to that limit here.
# For qiskit_swap_test on AerSimulator: 64 dims → 13 qubits (6+6+1 ancilla), manageable locally.
# See docs/FAQ.md - "What do dimensions, shots_values, and layers_values control?"
dimensions:
  - 64
  - 128
  # - 256
  # - 512  # full ViT-B/32 output; maximum accuracy, maximum qubit cost

# Number of circuit executions per similarity comparison (one shot = one measurement).
# More shots = lower variance = more accurate score, but higher cost on real hardware.
# For qiskit_swap_test on AerSimulator: 512 shots is a good balance of accuracy and speed.
# Safe default: 512. Practical ceiling: 4096 (~8× slower, near-noiseless).
shots_values:
  - 512
  - 1024
  # - 2048
  # - 4096

# Number of variational gate layers (ansatz depth). Required by the benchmark harness but not
# used by any currently enabled engine (qiskit_swap_test and qiskit_grover ignore it).
layers_values:
  - 1

# Number of results returned per search query. Acts as the result-set cutoff in API
# responses and as the k in MRR@k during benchmarks. Override at runtime with the
# SEARCH_TOP_K environment variable.
top_k: 10
