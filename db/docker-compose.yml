services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${DB_CONTAINER:-qvs-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-qvs_benchmarks}
      POSTGRES_USER: ${DB_USER:-qvs}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-qvs}
    ports:
      - "${DB_PORT:-6432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  adminer:
    image: adminer:latest
    container_name: qvs-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
