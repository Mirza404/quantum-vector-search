version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: qvs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qvs_benchmarks
      POSTGRES_USER: qvs
      POSTGRES_PASSWORD: qvs
    ports:
      - "6432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/sql/schema.sql:ro
      - ./data.sql:/sql/data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  adminer:
    image: adminer:latest
    container_name: qvs-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
