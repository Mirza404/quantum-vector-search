version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: qvs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qvs_benchmarks
      POSTGRES_USER: qvs
      POSTGRES_PASSWORD: qvs
    ports:
      - "6432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./data.sql:/docker-entrypoint-initdb.d/99-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
